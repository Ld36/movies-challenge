services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: movies-api-gateway
    ports:
      - "8080:8080"
    environment:
      APP_NAME: api-gateway
      APP_ENV: development
      HTTP_PORT: 8080
      MOVIE_SERVICE_GRPC_ADDRESS: movie-service:50051
    depends_on:
      movie-service:
        condition: service_started
    networks:
      - movies-network

  movie-service:
    build:
      context: ./movie-service
    container_name: movies-service
    ports:
      - "50051:50051"
    environment:
      APP_NAME: movie-service
      APP_ENV: development
      GRPC_PORT: 50051
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: movies_db
      MONGO_COLLECTION: movies
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - movies-network

  mongo:
    image: mongo:7
    container_name: movies-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - movies-network

volumes:
  mongo-data:

networks:
  movies-network:
    driver: bridge